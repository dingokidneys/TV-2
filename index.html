<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TV Signal Finder</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080c14">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────────── */
    :root {
      --bg:       #4c73c0;
      --surf:     #4b6596;
      --surf2:    #151d2e;
      --bdr:      #1e2d45;
      --teal:     #00d4aa;
      --amber:    #f5a623;
      --red:      #ff6b6b;
      --text:     #c8d8e8;
      --dim:      #dddedf;
      --bearings: #ffffff;
      --minorbearings: #696b69;
      --mono:     'JetBrains Mono', monospace;
      --sans:     'Rajdhani', sans-serif;
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 15px;
    }

    /* ── Full-screen flex column ───────────────────────── */
    #app {
      display: flex; flex-direction: column;
      height: 100vh; height: 100dvh;
    }

    /* ── Header ────────────────────────────────────────── */
    #hdr {
      flex: 0 0 auto;
      background: var(--surf);
      border-bottom: 1px solid var(--bdr);
      padding: 8px 14px;
      display: flex; align-items: center; gap: 10px;
    }

    .hdr-icon {
      width: 28px; height: 28px; background: var(--teal);
      border-radius: 6px; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }

    #hdr h1 {
      font-size: 18px; font-weight: 700;
      letter-spacing: 0.06em; color: #fff; flex: 1;
      text-align: center;
    }

    #hdr h1 em { color: var(--teal); font-style: normal; }

    /* ── Three panels — fill remaining height ──────────── */
    #panels {
      flex: 1 1 0; display: flex;
      flex-direction: column; min-height: 0;
    }

    /* Location panel — 10% */
    #locPanel {
      flex: 0 0 10%;
      background: var(--surf);
      border-bottom: 1px solid var(--bdr);
      padding: 4px 12px;
      display: flex; flex-direction: column;
      justify-content: center; gap: 3px;
      overflow: hidden;
    }

    /* Transmitter panel — 20% */
    #txPanel {
      flex: 0 0 20%;
      background: var(--bg);
      border-bottom: 1px solid var(--bdr);
      display: flex; flex-direction: column;
      min-height: 0;
    }

    /* Compass panel — 70% */
    #cmpPanel {
      flex: 0 0 70%;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; overflow: hidden;
    }

    /* ── Location panel content ────────────────────────── */
    .loc-status {
      font-size: 12px; color: var(--dim);
      display: flex; align-items: center; gap: 6px;
    }

    .spinner {
      width: 10px; height: 10px;
      border: 1.5px solid rgba(0,212,170,0.3);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loc-primary {
      font-size: 17px; font-weight: 700; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      align-items: center;
    }

    .loc-secondary {
      font-size: 13px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      align-items: center;
    }

    .loc-coords {
      font-family: var(--mono); font-size: 12px; color: var(--teal);
      letter-spacing: 0.04em;
      align-items: center;
    }

    /* ── Transmitter panel content ─────────────────────── */
    .tx-toolbar {
      flex: 0 0 auto;
      display: flex; align-items: center;
      gap: 8px; padding: 5px 10px;
      border-bottom: 1px solid var(--bdr);
    }

    .tx-toolbar span {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--teal); flex: 1;
    }

    #scanBtn {
      background: var(--teal); border: none; border-radius: 6px;
      color: #05120e; font-family: var(--sans); font-size: 13px;
      font-weight: 700; padding: 5px 14px; cursor: pointer;
      letter-spacing: 0.08em; transition: opacity 0.15s;
    }

    #scanBtn:active   { opacity: 0.7; }
    #scanBtn:disabled { opacity: 0.4; }

    #txList {
      flex: 1 1 0; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tx-row {
      display: flex; align-items: center;
      gap: 6px; padding: 6px 10px;
      border-bottom: 1px solid var(--bdr);
      cursor: pointer; transition: background 0.1s;
      user-select: none;
    }

    .tx-row:active    { background: var(--surf2); }
    .tx-row.selected  { background: rgba(0,212,170,0.08); border-left: 3px solid var(--teal); }

    .tx-rank {
      font-family: var(--mono); font-size: 10px;
      color: var(--dim); min-width: 20px; flex-shrink: 0;
    }

    .tx-info { flex: 1; min-width: 0; }

    .tx-name {
      font-size: 14px; font-weight: 700; color: #e8f0f8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .tx-meta-row {
      font-size: 11px; color: var(--dim);
      display: flex; gap: 8px; flex-wrap: wrap;
    }

    .tx-sig {
      font-family: var(--mono); font-size: 14px;
      font-weight: 600; color: var(--teal);
      flex-shrink: 0; min-width: 40px; text-align: right;
    }

    .tx-placeholder {
      padding: 18px 10px; font-size: 18px;
      color: var(--dim); text-align: center;
    }

    /* ── Compass panel content ─────────────────────────── */
    .cmp-title {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--dim);
    }

    .cmp-title.active { color: #fff; }

    .cmp-stats {
      display: flex; gap: 20px; text-align: center;
    }

    .stat-block { display: flex; flex-direction: column; gap: 2px; }

    .stat-lbl {
      font-size: 9px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--dim);
    }

    .stat-val {
      font-family: var(--mono); font-size: 17px;
      font-weight: 600; color: #fff;
    }

    .stat-val.t { color: var(--teal); }
    .stat-val.a { color: var(--amber); }

    /* Rose SVG — fills available compass panel space */
    #rose {
      width: min(80vw, 65vh);
      height: min(80vw, 65vh);
    }

    .cmp-note {
      font-size: 18px; color: var(--dim);
      text-align: center; max-width: 240px;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────── -->
  <div id="hdr">
    <div class="hdr-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="#030f0b" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="2 20 8 8 14 14 18 6 22 10"/>
        <path d="M22 6h-4v4"/>
      </svg>
    </div>
    <h1>TV <em>Signal</em> Finder</h1>
  </div>

  <div id="panels">

    <!-- ── Compass panel ─────────────────────────────── -->
    <div id="cmpPanel">
      <div class="cmp-title" id="cmpTitle">TAP A TRANSMITTER</div>

      <div class="cmp-stats" id="cmpStats" style="display:none">
        <div class="stat-block">
          <span class="stat-lbl">Bearing</span>
          <span class="stat-val t" id="cmpBrg">&#8212;</span>
        </div>
        <div class="stat-block">
          <span class="stat-lbl">Direction</span>
          <span class="stat-val" id="cmpDir">&#8212;</span>
        </div>
        <div class="stat-block">
          <span class="stat-lbl">Distance</span>
          <span class="stat-val a" id="cmpDist">&#8212;</span>
        </div>
      </div>

      <svg id="rose" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g id="roseGroup" style="transform-origin:100px 100px">
          <circle cx="100" cy="100" r="95" fill="none" stroke="#1e2d45" stroke-width="1.5"/>
          <circle cx="100" cy="100" r="88" fill="#0f1520" stroke="#1e2d45" stroke-width="1"/>
          <g stroke="#2a4060" stroke-width="1">
            <line x1="100" y1="6"   x2="100" y2="16"/>
            <line x1="100" y1="184" x2="100" y2="194"/>
            <line x1="6"   y1="100" x2="16"  y2="100"/>
            <line x1="184" y1="100" x2="194" y2="100"/>
          </g>
          <text x="100" y="30"  text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="14" font-weight="700" fill=var(--bearings)>N</text>
          <text x="100" y="178" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="14" font-weight="700" fill=var(--bearings)>S</text>
          <text x="172" y="104" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="14" font-weight="700" fill=var(--bearings)>E</text>
          <text x="28"  y="104" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="14" font-weight="700" fill=var(--bearings)>W</text>
          <text x="152" y="52"  text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="10" fill=var(--minorbearings)>NE</text>
          <text x="152" y="156" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="10" fill=var(--minorbearings)>SE</text>
          <text x="48"  y="156" text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="10" fill=var(--minorbearings)>SW</text>
          <text x="48"  y="52"  text-anchor="middle" font-family="'Rajdhani',sans-serif" font-size="10" fill=var(--minorbearings)>NW</text>
        </g>
        <text id="polLabel" x="100" y="107" text-anchor="middle"
              font-family="'Rajdhani',sans-serif" font-size="36" font-weight="700"
              fill="#00d4aa" opacity="0" letter-spacing="-1">&#8203;</text>
        <g id="pointerGroup" style="transform-origin:100px 100px; opacity:0.3">
          <polygon points="100,22 93,80 100,70 107,80" fill="#00d4aa"/>
          <polygon points="100,178 95,122 100,132 105,122" fill="#2a4060"/>
        </g>
      </svg>

      <div class="cmp-note" id="cmpNote">Waiting for compass&hellip;</div>
    </div>

    <!-- ── Transmitter panel ─────────────────────────── -->
    <div id="txPanel">
      <div class="tx-toolbar">
        <span>&#9650; Strongest Signals</span>
        <button id="scanBtn" onclick="doScan()" disabled>Rescan</button>
      </div>
      <div id="txList">
        <div class="tx-placeholder">Obtaining location&hellip;</div>
      </div>
    </div>

    <!-- ── Location panel ───────────────────────────── -->
    <div id="locPanel">
      <div class="loc-status" id="locStatus">
        <div class="spinner" id="locSpinner"></div>
        <span id="locStatusText">Getting location&hellip;</span>
      </div>
      <div class="loc-primary"   id="locPrimary"   style="display:none"></div>
      <div class="loc-secondary" id="locSecondary" style="display:none"></div>
      <div class="loc-coords"    id="locCoords"    style="display:none"></div>
    </div>

  </div><!-- /panels -->
</div><!-- /app -->

<script>
  // ═══════════════════════════════════════════════════
  // CONSTANTS & STATE
  // ═══════════════════════════════════════════════════
  const PI = Math.PI;

  let transmitters   = [];   // loaded from JSON
  let userLatRad     = null; // user position in radians
  let userLngRad     = null;
  let selectedTx     = null; // currently selected transmitter
  let smoothedAlpha  = null; // low-pass filtered sensor alpha
  let compassRunning = false;

  const SMOOTH = 0.12; // low-pass factor

  // ═══════════════════════════════════════════════════
  // LOAD TRANSMITTER DATA
  // ═══════════════════════════════════════════════════
  fetch('transmitters.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      transmitters = data;
      console.log('Loaded ' + data.length + ' transmitters');
    })
    .catch(() => {
      showLocError('Could not load transmitters.json');
    });

  // ═══════════════════════════════════════════════════
  // MATHS
  // ═══════════════════════════════════════════════════

  // Haversine — inputs in radians, returns km
  function haversine(la1, ln1, la2, ln2) {
    const dla = la2 - la1, dln = ln2 - ln1;
    const a = Math.sin(dla/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dln/2)**2;
    return 6371 * 2 * Math.asin(Math.sqrt(a));
  }

  // Forward azimuth — inputs in radians, returns 0-360 degrees
  function calcBearing(la1, ln1, la2, ln2) {
    const dln = ln2 - ln1;
    const x = Math.sin(dln) * Math.cos(la2);
    const y = Math.cos(la1)*Math.sin(la2) - Math.sin(la1)*Math.cos(la2)*Math.cos(dln);
    return (Math.atan2(x, y) * 180 / PI + 360) % 360;
  }

  // Received power — matches Excel: 1000 * ERP / (4 * PI * dist^2)
  function recvPower(erp, distKm) {
    return 1000 * erp / (4 * PI * distKm * distKm);
  }

  // Degrees to 16-point compass label
  function compassPt(deg) {
    const p = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
                'S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return p[Math.round(deg / 22.5) % 16];
  }

  function fmtDist(km) {
    return km < 10 ? km.toFixed(1) + ' km' : Math.round(km) + ' km';
  }

  // Smooth angle with wrap-around handling
  function smoothAngle(current, incoming) {
    if (current === null) return incoming;
    let d = incoming - current;
    if (d >  180) d -= 360;
    if (d < -180) d += 360;
    return (current + d * SMOOTH + 360) % 360;
  }

  // ═══════════════════════════════════════════════════
  // LOCATION — auto-start on load
  // ═══════════════════════════════════════════════════
  function showLocError(msg) {
    document.getElementById('locSpinner').style.display = 'none';
    document.getElementById('locStatusText').textContent = msg;
    document.getElementById('locStatusText').style.color = '#ff6b6b';
  }

  function onGPSSuccess(pos) {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    // Store in radians for calculations
    userLatRad = lat * PI / 180;
    userLngRad = lng * PI / 180;

    // Show coords immediately
    document.getElementById('locStatus').style.display = 'none';
    document.getElementById('locCoords').style.display = 'block';
    document.getElementById('locCoords').textContent =
      lat.toFixed(4) + '\u00b0, ' + lng.toFixed(4) + '\u00b0';

    // Step 2 & 3 — build table and auto-select first entry immediately
    document.getElementById('scanBtn').disabled = false;
    doScan();

    // Step 4 — populate location data after table and compass are rendered
    setTimeout(() => reverseGeocode(lat, lng), 100);
  }

  function onGPSError(err) {
    const msg = err.code === 1
      ? 'Location permission denied'
      : 'Could not get location';
    showLocError(msg);
  }

  async function reverseGeocode(lat, lng) {
    try {
      // Run both lookups in parallel
      const [nomRes, pcRes] = await Promise.all([
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=16&addressdetails=1`,
              { headers: { 'Accept-Language': 'en' } }),
        fetch(`https://api.postcodes.io/postcodes?lon=${lng}&lat=${lat}&limit=1`)
      ]);

      const nomData = await nomRes.json();
      const pcData  = await pcRes.json();

      const a = nomData.address || {};

      // Accurate postcode from postcodes.io (nearest to exact GPS coords)
      const postcode = (pcData.status === 200 && pcData.result && pcData.result[0])
        ? pcData.result[0].postcode
        : (a.postcode || '');

      // Street and locality from Nominatim
      const road     = a.road || a.pedestrian || a.path || '';
      const locality = a.suburb || a.village || a.town || a.city_district || '';
      const town     = a.town || a.city || a.county || '';

      const primary   = [road, locality].filter(Boolean).join(', ') || 'Unknown street';
      const secondary = [postcode, town, a.county].filter(Boolean).join(' \u00b7 ');

      document.getElementById('locPrimary').textContent   = primary;
      document.getElementById('locSecondary').textContent = secondary;
      document.getElementById('locPrimary').style.display   = 'block';
      document.getElementById('locSecondary').style.display = 'block';

    } catch(e) {
      document.getElementById('locPrimary').textContent = 'Address unavailable';
      document.getElementById('locPrimary').style.display = 'block';
    }
  }

  // Request GPS on page load
  if ('geolocation' in navigator) {
    navigator.geolocation.getCurrentPosition(onGPSSuccess, onGPSError, {
      enableHighAccuracy: true, timeout: 15000, maximumAge: 60000
    });
  } else {
    showLocError('Geolocation not supported on this device');
  }

  // ═══════════════════════════════════════════════════
  // SCAN — calculate top 6 by received signal
  // ═══════════════════════════════════════════════════
  function doScan() {
    if (!transmitters.length) return;
    if (userLatRad === null) return;

    // Calculate for all transmitters
    const all = transmitters.map(tx => {
      const dist = haversine(userLatRad, userLngRad, tx.lat, tx.lng);
      const recv = recvPower(tx.power, dist);
      const brg  = calcBearing(userLatRad, userLngRad, tx.lat, tx.lng);
      return { ...tx, dist, recv, brg };
    });

    // Sort by received power, take top 6
    const top6 = all.sort((a, b) => b.recv - a.recv).slice(0, 6);

    // Normalise to strongest = 100%
    const maxRecv = top6[0].recv;
    top6.forEach(tx => { tx.pct = Math.round(tx.recv / maxRecv * 100); });

    renderTxList(top6);
  }

  function renderTxList(data) {
    const list = document.getElementById('txList');
    list.innerHTML = '';

    data.forEach((tx, i) => {
      const div = document.createElement('div');
      div.className = 'tx-row';
      div.dataset.idx = i;
      div.onclick = () => selectTx(tx, div);

      div.innerHTML = `
        <span class="tx-rank">#${i+1}</span>
        <div class="tx-info">
          <div class="tx-name">${tx.site}</div>
          <div class="tx-meta-row">
            <span>${tx.region}</span>
            <span>${tx.pol}</span>
            <span>${fmtDist(tx.dist)}</span>
            <span>${Math.round(tx.brg)}\u00b0&thinsp;${compassPt(tx.brg)}</span>
          </div>
        </div>
        <span class="tx-sig">${tx.pct}%</span>`;

      list.appendChild(div);
    });

    // Auto-select first entry
    const firstRow = list.querySelector('.tx-row');
    if (firstRow) firstRow.click();
  }

  // ═══════════════════════════════════════════════════
  // TRANSMITTER SELECTION — updates compass
  // ═══════════════════════════════════════════════════
  function selectTx(tx, rowEl) {
    // Highlight selected row
    document.querySelectorAll('.tx-row').forEach(r => r.classList.remove('selected'));
    rowEl.classList.add('selected');

    selectedTx = tx;

    // Update compass stats
    document.getElementById('cmpTitle').textContent = tx.site;
    document.getElementById('cmpTitle').classList.add('active');
    document.getElementById('cmpStats').style.display = 'flex';
    document.getElementById('cmpBrg').textContent  = Math.round(tx.brg) + '\u00b0';
    document.getElementById('cmpDir').textContent  = compassPt(tx.brg);
    document.getElementById('cmpDist').textContent = fmtDist(tx.dist);

    // Make pointer fully visible and show polarisation
    document.getElementById('pointerGroup').style.opacity = '1';
    const polEl = document.getElementById('polLabel');
    polEl.textContent = tx.pol || '?';
    polEl.style.opacity = '1';

    // Set static bearing until sensor fires
    setPointer(tx.brg, 0);

    // Start compass if not already running
    startCompass();
  }

  // ═══════════════════════════════════════════════════
  // COMPASS — orientation sensor
  // ═══════════════════════════════════════════════════

  // alpha convention on Android (confirmed by user data):
  //   alpha DECREASES as phone rotates CLOCKWISE
  //   compass_heading_of_phone = (360 - alpha) % 360
  //
  // To keep rose N pointing geographic north:
  //   roseGroup rotates by +alpha (counters the CW physical rotation)
  //
  // To keep pointer on transmitter bearing in world space:
  //   pointerGroup rotates by (brg + alpha) % 360

  function setPointer(brg, alpha) {
    const roseAngle    = alpha % 360;
    const pointerAngle = (brg + alpha) % 360;
    document.getElementById('roseGroup').style.transform    = `rotate(${roseAngle}deg)`;
    document.getElementById('pointerGroup').style.transform = `rotate(${pointerAngle}deg)`;
  }

  function onOrientation(e) {
    if (e.alpha === null || e.alpha === undefined) return;

    smoothedAlpha = smoothAngle(smoothedAlpha, e.alpha);

    if (selectedTx) {
      setPointer(selectedTx.brg, smoothedAlpha);
    } else {
      // Just rotate the rose even without a selection so user can see it's live
      document.getElementById('roseGroup').style.transform =
        `rotate(${smoothedAlpha}deg)`;
    }

    document.getElementById('cmpNote').textContent = 'Hold phone flat, face up';
  }

  function startCompass() {
    if (compassRunning) return;
    compassRunning  = true;
    smoothedAlpha   = null;

    // Always remove first to prevent any duplicate listeners
    window.removeEventListener('deviceorientationabsolute', onOrientation, true);
    window.removeEventListener('deviceorientation',         onOrientation, true);

    if ('ondeviceorientationabsolute' in window) {
      window.addEventListener('deviceorientationabsolute', onOrientation, true);
      document.getElementById('cmpNote').textContent = 'Waiting for compass\u2026';
    } else {
      window.addEventListener('deviceorientation', onOrientation, true);
      document.getElementById('cmpNote').textContent = 'Relative compass \u2014 results approximate';
    }
  }

  // ═══════════════════════════════════════════════════
  // SERVICE WORKER
  // ═══════════════════════════════════════════════════
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
